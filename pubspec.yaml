name: hmr_chatbot
description: HMR (همر) — Persian AI mobile-hardware advisor. Glassmorphism + neon chat UI.
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.2.0
  sqflite: ^2.3.3
  # Web-only backend for sqflite (IndexedDB + sqlite3.wasm). Present on all
  # platforms but only imported on the web via a conditional import in
  # lib/database/chat_database.dart, so native builds are unaffected.
  sqflite_common_ffi_web: ^1.1.2
  path: ^1.9.0
  google_sign_in: ^7.2.0
  # GIS renderButton widget for web (authenticate() is unsupported there —
  # google_sign_in_web.supportsAuthenticate() is always false). Already
  # resolved transitively via google_sign_in; listed directly because
  # lib/widgets/google_signin_web_button_web.dart imports it.
  google_sign_in_web: ^1.1.3
  url_launcher: ^6.3.0
  uuid: ^4.5.1
  connectivity_plus: ^7.3.0
  sentry_flutter: ^9.24.0
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4
  flutter_lints: ^6.0.0

# Icons come from two hand-authored masters: assets/images/hmr_launcher.png
# (the mark on a navy squircle — the only artwork that carries a background)
# and assets/images/hmr-mark.png (the bare transparent mark). Every other icon
# is derived by tool/gen_icons.py, which must run before the two generators.
flutter_launcher_icons:
  android: true
  ios: true
  # Legacy (pre-API-26) launchers and iOS both take the pre-composed artwork.
  image_path: "assets/images/hmr_launcher.png"
  min_sdk_android: 21
  # Adaptive icon: a flat brand plate behind the bare mark. The foreground PNG
  # already carries its safe-zone padding, so the inset is pinned to 0 and
  # tool/gen_icons.py stays the single place the framing is decided.
  adaptive_icon_background: "#05070F"
  adaptive_icon_foreground: "assets/images/hmr_launcher_foreground.png"
  adaptive_icon_foreground_inset: 0
  # The App Store rejects icons with an alpha channel; flatten the squircle's
  # transparent corners onto the same navy the artwork already sits on.
  remove_alpha_ios: true
  background_color_ios: "#05070F"
  # Web icons are generated by tool/gen_icons.py instead. This tool derives
  # every web output from a single image, but a transparent favicon and an
  # opaque, padded maskable icon cannot come from the same source.
  web:
    generate: false

flutter_native_splash:
  color: "#05070F"
  image: "assets/images/splash_logo.png"
  android_12:
    color: "#05070F"
    # Android 12+ masks the splash icon to a circle two thirds of the canvas
    # wide, so it needs its own padded copy.
    image: "assets/images/splash_logo_android12.png"

flutter:
  uses-material-design: true

  # Only the mark is loaded at runtime (HmrAvatar). The launcher and splash
  # sources alongside it are read by the icon generators at build time and are
  # deliberately not bundled into the app.
  assets:
    - assets/images/hmr-mark.png

  fonts:
    # Latin / display (HMR wordmark, embedded English & numerals). Bundled
    # locally — never fetched at runtime (Google Fonts CDN is unreliable in Iran).
    # Rubik has no Persian glyphs; Persian falls back to Vazirmatn per-glyph.
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rubik-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rubik-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rubik-Bold.ttf
          weight: 700
        - asset: assets/fonts/Rubik-ExtraBold.ttf
          weight: 800

    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-Black.ttf
          weight: 900
