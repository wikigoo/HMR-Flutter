name: hmr_chatbot
description: HMR (همر) — Persian AI mobile-hardware advisor. Glassmorphism + neon chat UI.
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.2.0
  intl: ^0.20.2
  sqflite: ^2.3.3
  # Web-only backend for sqflite (IndexedDB + sqlite3.wasm). Present on all
  # platforms but only imported on the web via a conditional import in
  # lib/database/chat_database.dart, so native builds are unaffected.
  sqflite_common_ffi_web: ^0.4.5
  path: ^1.9.0
  google_sign_in: ^7.2.0
  url_launcher: ^6.3.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  sentry_flutter: 9.0.0
  flutter_markdown_plus: ^1.0.7
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/hmr_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#05070F"
  adaptive_icon_foreground: "assets/images/hmr_logo.png"
  web:
    generate: true
    image_path: "assets/images/hmr_logo.png"

flutter_native_splash:
  color: "#05070F"
  image: "assets/images/hmr_logo.png"
  android_12:
    color: "#05070F"
    image: "assets/images/hmr_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/hmr_logo.png
    - assets/images/hmr-mark.png
    - assets/images/hmr-avatar.png

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-VF.ttf

    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-Black.ttf
          weight: 900
