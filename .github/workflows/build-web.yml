name: Build Flutter Web

# Builds the Flutter web version of HMR and publishes it as a PUBLIC release
# asset (tag: web-latest). The private HMR-VPS repo then deploys it to
# https://hmrbot.com/ai. No VPS credentials live here.
#
# SECURITY: the web bundle is built with an EMPTY HMR_API_TOKEN on purpose.
# The VPS nginx reverse proxy injects the real Bearer token on the
# /api/v1/prediction/ path, so nothing secret ends up in the public JS bundle.

on:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-web.yml'
  workflow_dispatch:

permissions:
  contents: write          # to publish the web-latest release asset

jobs:
  build-web:
    name: Flutter Web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (served under /ai, no secret token in the bundle)
        run: |
          flutter build web --release \
            --base-href /ai/ \
            --dart-define=HMR_API_TOKEN= \
            --dart-define=SENTRY_DSN=

      - name: Package build
        run: tar -czf hmr-web.tar.gz -C build/web .

      - name: Publish as web-latest release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: web-latest
          name: Flutter Web (latest build)
          prerelease: true
          body: >
            Rolling Flutter web build of HMR, served at https://hmrbot.com/ai.
            Built with an empty API token; the VPS proxy injects the real one.
          files: hmr-web.tar.gz
