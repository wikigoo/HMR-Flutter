name: Build Release AAB

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Signed Android App Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Accept SDK licenses (the previous CI run failed on LicenceNotAcceptedException)
      # and pre-install the exact toolchain that android/build.gradle.kts pins for every
      # module, so the build does not stall trying to resolve missing components.
      - name: Accept licenses & install required SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "build-tools;36.1.0" "ndk;30.0.14904198"

      - name: "Guard: versionCode must be bumped from last release"
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "Current versionCode: $CURRENT"
          LAST_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            git checkout "$LAST_TAG" -- pubspec.yaml 2>/dev/null || true
            PREV=$(grep '^version:' pubspec.yaml | sed 's/.*+//' 2>/dev/null || echo "0")
            git checkout HEAD -- pubspec.yaml
            echo "Last release versionCode: $PREV (tag: $LAST_TAG)"
            if [ "$CURRENT" -le "$PREV" ]; then
              echo "❌ versionCode=$CURRENT has not been bumped (last=$PREV). Update pubspec.yaml before uploading."
              exit 1
            fi
          else
            echo "No previous tag found — first release, skipping version guard."
          fi

      - name: Install Flutter dependencies
        run: flutter pub get

      # Inject google-services.json (gitignored; stored as a base64 GitHub secret)
      - name: Inject google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" \
            | base64 --decode > android/app/google-services.json

      # Decode the keystore to a temp path outside the repo tree
      - name: Decode upload keystore
        run: |
          echo "${{ secrets.HMR_KEYSTORE_BASE64 }}" \
            | base64 --decode > "$RUNNER_TEMP/hmr-release.jks"
          echo "HMR_KEYSTORE_PATH=$RUNNER_TEMP/hmr-release.jks" >> "$GITHUB_ENV"

      - name: Build release AAB
        env:
          HMR_KEY_ALIAS:      ${{ secrets.HMR_KEY_ALIAS }}
          HMR_KEY_PASSWORD:   ${{ secrets.HMR_KEY_PASSWORD }}
          HMR_STORE_PASSWORD: ${{ secrets.HMR_STORE_PASSWORD }}
          # HMR_KEYSTORE_PATH is already set in GITHUB_ENV from the decode step
        run: |
          flutter build appbundle --release \
            --dart-define=HMR_API_TOKEN=${{ secrets.HMR_API_TOKEN }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: hmr-release-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Clean up keystore from runner immediately after build
      - name: Remove keystore from runner
        if: always()
        run: rm -f "$RUNNER_TEMP/hmr-release.jks"
